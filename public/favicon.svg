<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Atom-like physics icon -->
  <circle cx="64" cy="64" r="60" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <!-- Electron orbits -->
  <ellipse cx="64" cy="64" rx="45" ry="18" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="64" cy="64" rx="45" ry="18" fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.8" transform="rotate(60 64 64)"/>
  <ellipse cx="64" cy="64" rx="45" ry="18" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.8" transform="rotate(120 64 64)"/>
  <!-- Nucleus -->
  <circle cx="64" cy="64" r="8" fill="#f59e0b"/>
  <!-- Psi symbol hint -->
  <text x="64" y="72" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#0f172a">ψ</text>
</svg>
